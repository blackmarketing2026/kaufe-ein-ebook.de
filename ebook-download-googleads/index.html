<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Danke für deinen Kauf – kaufe-ein-ebook.de</title>
  <link rel="icon" type="image/webp" href="../assets/img/logo-256.webp" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--color-navy) 0%, var(--color-navy-dark) 100%);
      padding: 40px 20px;
    }

    .thank-you {
      text-align: center;
      max-width: 420px;
    }

    .thank-you .eyebrow {
      display: inline-block;
      background: rgba(244, 121, 32, 0.16);
      color: #ffb066;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .thank-you .cover {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
      margin: 0 auto 32px;
    }

    .thank-you .btn-primary {
      font-size: 1.05rem;
      padding: 16px 40px;
    }
  </style>
</head>
<body>

  <div class="thank-you">
    <span class="eyebrow">Danke für deinen Kauf</span>
    <img
      class="cover"
      src="../assets/img/products/ebook-google-ads-cover.webp"
      alt="Cover: So gewinnt man Kunden über Google Ads"
      width="600"
      height="900"
    />
    <a href="#" class="btn btn-primary">E-Book herunterladen</a>
  </div>

</body>
</html>
